spring.application.name=ai-opportunity-backend

server.port=${APP_SERVER_PORT:8080}

spring.datasource.url=${APP_DB_URL:jdbc:mysql://127.0.0.1:3306/ai_opportunity_score?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${APP_DB_USERNAME:root}
spring.datasource.password=${APP_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jackson.default-property-inclusion=non_null

app.storage.task-results-dir=${APP_TASK_RESULTS_DIR:../ai-opportunity-agent/data/task-results}
app.agent.agent-dir=${APP_AGENT_DIR:../ai-opportunity-agent}
app.agent.logs-dir=${APP_AGENT_LOGS_DIR:../ai-opportunity-agent/data/runtime-logs}
app.agent.node-command=${APP_AGENT_NODE_COMMAND:node}
